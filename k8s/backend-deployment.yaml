apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aitask
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: backend
          image: your-dockerhub/aitask-backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aitask-config
            - secretRef:
                name: aitask-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: aitask
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
